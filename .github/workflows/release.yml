name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install global webOS tools
        # @webos-tools/cli is pinned to 3.2.3: 3.2.4 bumps rimraf to 6.x, which is no
        # longer callable the way ares-package invokes it and breaks the Package IPK step.
        run: npm install -g @enact/cli @webos-tools/cli@3.2.3

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: |
          node --version
          npm --version
          enact --version
          npm run pack-p 2>&1 | tee build-output.log
          EXIT=${PIPESTATUS[0]}
          echo "Pack exit code: $EXIT"
          ls -la dist/ || echo "No dist directory"
          exit $EXIT

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log
          if-no-files-found: warn

      - name: Package IPK
        run: |
          mkdir -p build
          ares-package dist/ -o ./build/ -n
          ls -la build/

      - name: Generate manifest.json
        run: node tools/build-manifest.mjs build/*.ipk build/manifest.json

      - name: Upload artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ipk-and-manifest
          path: |
            build/*.ipk
            build/manifest.json

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.ipk
            build/manifest.json
          fail_on_unmatched_files: true
          generate_release_notes: true
